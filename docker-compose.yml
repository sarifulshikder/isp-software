services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.alpine
    container_name: isp_backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: isp_db
    restart: always
    environment:
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: isp_management
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
