version: '3.8'

services:
  isp_db:
    image: postgres:15-alpine
    container_name: isp_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: isp_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  isp_backend:
    build: ./backend
    container_name: isp_backend
    ports:
      - "5000:5000"
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: isp_db
      DB_PORT: 5432
      DB_NAME: isp_manager
    depends_on:
      - isp_db

  isp_frontend:
    build: ./frontend
    container_name: isp_frontend
    ports:
      - "80:80"
    depends_on:
      - isp_backend

volumes:
  postgres_data:
