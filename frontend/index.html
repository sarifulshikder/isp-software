<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Manager - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background: #0d6efd; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="header"><h3>Add New Customer</h3></div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col"><input type="text" id="name" class="form-control" placeholder="Full Name"></div>
                            <div class="col"><input type="text" id="username" class="form-control" placeholder="Username"></div>
                            <div class="col"><input type="password" id="password" class="form-control" placeholder="Password"></div>
                            <div class="col-auto"><button onclick="addCustomer()" class="btn btn-primary">Add Customer</button></div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-body">
                        <h4>Active Customers</h4>
                        <table class="table table-hover mt-3">
                            <thead class="table-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Username</th>
                                    <th>Profile</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="customerTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="frontend/script.js"></script>
</body>
</html>
