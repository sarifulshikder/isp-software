<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Manager - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .header { background: #0d6efd; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .table thead { background-color: #f1f3f5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-11">
                <div class="card mb-4">
                    <div class="header"><h3>Add New Customer</h3></div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3"><input type="text" id="name" class="form-control" placeholder="Full Name"></div>
                            <div class="col-md-3"><input type="text" id="username" class="form-control" placeholder="Username"></div>
                            <div class="col-md-3"><input type="password" id="password" class="form-control" placeholder="Password"></div>
                            <div class="col-md-3"><button onclick="addCustomer()" class="btn btn-primary w-100">Add Customer</button></div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h4 class="mb-4">Active Customers List</h4>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Username</th>
                                        <th>Profile</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="customerTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
